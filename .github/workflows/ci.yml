name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @scoriiu/fenshot
      - run: npm test -w @scoriiu/fenshot
      - run: npm run build -w web
      - run: npm run build -w extension
